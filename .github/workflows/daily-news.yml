name: Daily Cyber News Agent
on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *' 

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ask Gemini for News
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
          -H 'Content-Type: application/json' \
          -d '{
            "contents": [{
              "parts":[{
                "text": "Write a Jekyll blog post. You MUST start the file with exactly three dashes '---' on line 1. Include layout: post, title, and date in the front matter, then close with three dashes '---'. Then write about today's top 3 cybersecurity news stories with impact and mitigation. Output ONLY the raw markdown."
              }]
            }],
            "safetySettings": [
              {
                "category": "HARM_CATEGORY_DANGEROUS_CONTENT",
                "threshold": "BLOCK_NONE"
              }
            ]
          }' > response.json
          
          cat response.json
          
          python3 -c "import json; r = json.load(open('response.json')); print(r['candidates'][0]['content']['parts'][0]['text'])" > "_posts/$(date +%Y-%m-%d)-daily-intel.md"
      - name: Commit and Push
        run: |
          git config --global user.name "CyberNewsBot"
          git config --global user.email "bot@retroflowing.com"
          git add _posts/*.md
          git commit -m "Automated Daily Threat Intel" || echo "No changes to commit"
          git pull origin main --rebase
          git push origin main
