name: Daily Cyber News Agent
on:
  workflow_dispatch: # Allows you to run it manually
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Ask Gemini for News
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 1. Fetch the news
          curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
          -H 'Content-Type: application/json' \
          -d '{
            "contents": [{
              "parts":[{
                "text": "Write a professional Jekyll blog post about today top 3 cybersecurity news stories. Focus on impact and mitigation. Include Front Matter with layout: post, title, and date. Output ONLY markdown."
              }]
            }]
          }' > response.json

          # 2. Check for errors and extract text
          if grep -q "error" response.json; then
            echo "API Error Detected:"
            cat response.json
            exit 1
          else
            python3 -c "import json; r = json.load(open('response.json')); print(r['candidates'][0]['content']['parts'][0]['text'])" > _posts/$(date +%Y-%m-%d)-daily-intel.md
          fi
      - name: Commit and Push
        run: |
          git config --global user.name "CyberNewsBot"
          git config --global user.email "bot@retroflowing.com"
          git add _posts/*.md
          git commit -m "Automated Daily Threat Intel"
          git push
